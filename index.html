<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Слова</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F2EC; --card: #FFFDF8; --ink: #1A1612; --ink2: #6B5E52; --ink3: #A8998D;
    --accent: #2E5C3E; --accent-light: #EAF2ED; --red: #8B2E2E; --red-light: #F5EAEA;
    --border: rgba(26,22,18,0.1); --shadow: 0 2px 20px rgba(26,22,18,0.08);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem 4rem; }
  .screen { display: none; width: 100%; max-width: 520px; }
  .screen.active { display: block; }
  #screen-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--ink3); font-size: 0.9rem; }
  .error-box { background: var(--red-light); border: 1px solid var(--red); border-radius: 12px; padding: 1.2rem 1.5rem; color: var(--red); font-size: 0.88rem; line-height: 1.6; margin-top: 1rem; }
  .home-header { text-align: center; margin-bottom: 3rem; padding-top: 1rem; }
  .home-header h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 0.5rem; }
  .home-header p { color: var(--ink2); font-size: 0.95rem; font-weight: 300; }
  .mode-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; display: flex; align-items: center; gap: 1.2rem; box-shadow: var(--shadow); }
  .mode-card:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(26,22,18,0.12); }
  .mode-card:active { transform: translateY(0); }
  .mode-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
  .mode-icon.ru { background: #EEF0F9; } .mode-icon.en { background: #EAF2ED; }
  .mode-info h3 { font-size: 1rem; font-weight: 500; margin-bottom: 2px; }
  .mode-info p { font-size: 0.82rem; color: var(--ink3); }
  .home-stats { margin-top: 2rem; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.5rem; box-shadow: var(--shadow); }
  .home-stats-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink3); margin-bottom: 1rem; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 0.88rem; color: var(--ink2); }
  .stat-val { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
  .progress-track { height: 5px; background: var(--border); border-radius: 3px; margin-top: 1rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.5s ease; }
  .quiz-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
  .quiz-back { background: none; border: none; cursor: pointer; color: var(--ink2); font-size: 0.88rem; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 6px; padding: 0; }
  .quiz-back:hover { color: var(--ink); }
  .quiz-counter { font-size: 0.82rem; color: var(--ink3); }
  .quiz-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem 2rem; text-align: center; box-shadow: var(--shadow); margin-bottom: 1rem; animation: slideIn 0.25s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .quiz-direction { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink3); margin-bottom: 1.2rem; }
  .quiz-word { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 400; line-height: 1.2; margin-bottom: 2rem; }
  .quiz-input { width: 100%; font-size: 1.1rem; font-family: 'DM Sans', sans-serif; padding: 0.9rem 1.2rem; border: 1.5px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--ink); outline: none; text-align: center; transition: border-color 0.2s, background 0.2s; }
  .quiz-input:focus { border-color: var(--accent); background: var(--card); }
  .quiz-input.ok  { border-color: var(--accent); background: var(--accent-light); }
  .quiz-input.err { border-color: var(--red);    background: var(--red-light); }
  .quiz-feedback { min-height: 1.4rem; font-size: 0.9rem; margin-top: 0.8rem; font-weight: 500; }
  .quiz-feedback.ok  { color: var(--accent); }
  .quiz-feedback.err { color: var(--red); }
  .dots { display: flex; gap: 6px; justify-content: center; margin-top: 1.2rem; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #DDD8D2; transition: background 0.3s, transform 0.2s; }
  .dot.filled { background: var(--accent); }
  .dot.flash  { background: var(--red); transform: scale(1.4); }

  /* Button row: Проверить + Пропустить side by side */
  .btn-row { display: flex; gap: 8px; margin-top: 0.75rem; }
  .quiz-btn {
    flex: 1; padding: 0.95rem; background: var(--ink); color: var(--bg);
    border: none; border-radius: 12px; font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
  }
  .quiz-btn:hover { background: #333; }
  .quiz-btn:active { transform: scale(0.99); }
  .quiz-btn.secondary {
    background: transparent; color: var(--ink2);
    border: 1px solid var(--border);
  }
  .quiz-btn.secondary:hover { background: var(--bg); color: var(--ink); }

  /* "Не знаю" link below */
  .dontknow-link {
    display: block; text-align: center; margin-top: 0.75rem;
    font-size: 0.82rem; color: var(--ink3); cursor: pointer;
    background: none; border: none; font-family: 'DM Sans', sans-serif;
    width: 100%; padding: 0;
  }
  .dontknow-link:hover { color: var(--ink2); }

  .done-screen { text-align: center; padding: 3rem 1rem; }
  .done-screen h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 0.6rem; }
  .done-screen p { color: var(--ink2); margin-bottom: 2rem; font-size: 0.9rem; }
  .done-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 2rem; max-height: 300px; overflow-y: auto; }
  .done-tag { font-size: 0.82rem; padding: 5px 14px; background: var(--accent-light); color: var(--accent); border-radius: 20px; }
  .reset-btn { padding: 0.85rem 2.5rem; border: 1.5px solid var(--ink); border-radius: 12px; background: none; color: var(--ink); font-size: 0.9rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s; }
  .reset-btn:hover { background: var(--border); }
</style>
</head>
<body>

<div id="screen-loading" class="screen active">
  <div class="spinner"></div>
  <div class="loading-text">Загружаем слова...</div>
</div>

<div class="screen" id="screen-home">
  <div class="home-header"><h1>Слова</h1><p>Выберите направление перевода</p></div>
  <div class="mode-card" onclick="startQuiz('ru-en')">
    <div class="mode-icon ru">🇷🇺</div>
    <div class="mode-info"><h3>Русский → Английский</h3><p>Видите русское слово — пишете по-английски</p></div>
  </div>
  <div class="mode-card" onclick="startQuiz('en-ru')">
    <div class="mode-icon en">🇬🇧</div>
    <div class="mode-info"><h3>Английский → Русский</h3><p>Видите английское слово — пишете по-русски</p></div>
  </div>
  <div class="home-stats" id="home-stats"></div>
</div>

<div class="screen" id="screen-quiz">
  <div class="quiz-top">
    <button class="quiz-back" onclick="goHome()">← Назад</button>
    <span class="quiz-counter" id="quiz-counter"></span>
  </div>
  <div class="quiz-card" id="quiz-card">
    <div class="quiz-direction" id="quiz-dir"></div>
    <div class="quiz-word" id="quiz-word"></div>
    <input class="quiz-input" id="quiz-input" type="text"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      placeholder="Введите перевод..." />
    <div class="quiz-feedback" id="quiz-feedback"></div>
    <div class="dots" id="quiz-dots"></div>
  </div>

  <div class="btn-row">
    <button class="quiz-btn" id="quiz-btn" onclick="handleBtn()">Проверить</button>
    <button class="quiz-btn secondary" id="skip-btn" onclick="skipWord()">Пропустить</button>
  </div>
  <button class="dontknow-link" id="dontknow-btn" onclick="dontKnow()">Не знаю</button>
</div>

<div class="screen" id="screen-done">
  <div class="done-screen">
    <h2>Все слова выучены!</h2>
    <p>Словарный запас пополнен. Так держать.</p>
    <div class="done-tags" id="done-tags"></div>
    <button class="reset-btn" onclick="resetProgress()">Начать заново</button>
  </div>
</div>

<script>
const STREAK_NEEDED = 3;
const STORAGE_STATS = 'wordtrainer_stats_v2';
let words = [], stats = {}, mode = 'ru-en', current = null, phase = 'input';

async function init() {
  try {
    const res = await fetch('words.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    words = await res.json();
    if (!Array.isArray(words) || !words.length) throw new Error('Пустой файл');
  } catch(e) {
    document.querySelector('.loading-text').textContent = '';
    document.querySelector('.spinner').style.display = 'none';
    const err = document.createElement('div');
    err.className = 'error-box';
    err.innerHTML = 'Не удалось загрузить <b>words.json</b>.<br>Убедитесь, что файл лежит рядом с <b>index.html</b>.<br><br>Ошибка: ' + e.message;
    document.getElementById('screen-loading').appendChild(err);
    return;
  }
  try { const ss = localStorage.getItem(STORAGE_STATS); stats = ss ? JSON.parse(ss) : {}; } catch { stats = {}; }
  words.forEach(w => { if (!stats[w.en]) stats[w.en] = { streak: 0, learned: false }; });
  renderHome();
}

function saveStats() { try { localStorage.setItem(STORAGE_STATS, JSON.stringify(stats)); } catch(e) {} }
function normalize(s) { return s.trim().toLowerCase().replace(/[.,!?;:'"]/g, ''); }
function activeWords() { return words.filter(w => !stats[w.en]?.learned); }

function pickWord() {
  const pool = activeWords();
  if (!pool.length) return null;
  const weights = pool.map(w => Math.max(1, STREAK_NEEDED - (stats[w.en]?.streak || 0) + 1));
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) { r -= weights[i]; if (r <= 0) return pool[i]; }
  return pool[pool.length - 1];
}

function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function renderDots(streak, flash) {
  return Array.from({length: STREAK_NEEDED}, (_, i) => {
    let cls = 'dot';
    if (flash) cls += ' flash';
    else if (i < streak) cls += ' filled';
    return '<div class="' + cls + '"></div>';
  }).join('');
}

function setControlsState(state) {
  // state: 'input' | 'next' | 'dontknow-shown'
  const mainBtn   = document.getElementById('quiz-btn');
  const skipBtn   = document.getElementById('skip-btn');
  const dontknow  = document.getElementById('dontknow-btn');

  if (state === 'input') {
    mainBtn.textContent = 'Проверить';
    mainBtn.onclick = handleBtn;
    skipBtn.style.display = '';
    dontknow.style.display = '';
  } else if (state === 'next') {
    mainBtn.textContent = 'Следующее →';
    mainBtn.onclick = () => animateNext();
    skipBtn.style.display = 'none';
    dontknow.style.display = 'none';
  }
}

function renderHome() {
  const total = words.length, learned = words.filter(w => stats[w.en]?.learned).length;
  const pct = total ? Math.round(learned / total * 100) : 0;
  document.getElementById('home-stats').innerHTML =
    '<div class="home-stats-title">Прогресс</div>' +
    '<div class="stat-row"><span class="stat-label">Всего слов</span><span class="stat-val">' + total + '</span></div>' +
    '<div class="stat-row"><span class="stat-label">Выучено</span><span class="stat-val" style="color:var(--accent)">' + learned + '</span></div>' +
    '<div class="stat-row"><span class="stat-label">Осталось</span><span class="stat-val">' + (total - learned) + '</span></div>' +
    '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
  show('screen-home');
}

function startQuiz(m) { mode = m; nextCard(); }

function nextCard() {
  if (!activeWords().length) { showDone(); return; }
  current = pickWord();
  if (!current) { showDone(); return; }
  phase = 'input';
  document.getElementById('quiz-dir').textContent = mode === 'ru-en' ? 'Переведите на английский' : 'Переведите на русский';
  document.getElementById('quiz-word').textContent = mode === 'ru-en' ? current.ru : current.en;
  const inp = document.getElementById('quiz-input');
  inp.value = ''; inp.className = 'quiz-input'; inp.disabled = false;
  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('quiz-feedback').className = 'quiz-feedback';
  document.getElementById('quiz-dots').innerHTML = renderDots(stats[current.en]?.streak || 0, false);
  const learned = words.filter(w => stats[w.en]?.learned).length;
  document.getElementById('quiz-counter').textContent = learned + ' / ' + words.length + ' выучено';
  setControlsState('input');
  show('screen-quiz');
  setTimeout(() => inp.focus(), 50);
}

function handleBtn() {
  const inp = document.getElementById('quiz-input');
  const val = inp.value.trim();
  if (!val) return;
  const answer = mode === 'ru-en' ? current.en : current.ru;
  const isOk = normalize(val) === normalize(answer);
  const fb = document.getElementById('quiz-feedback');
  const dotsEl = document.getElementById('quiz-dots');

  if (isOk) {
    stats[current.en].streak++;
    const s = stats[current.en].streak;
    const isLearned = s >= STREAK_NEEDED;
    if (isLearned) stats[current.en].learned = true;
    fb.textContent = isLearned ? '✓ Правильно! Слово выучено 🎉' : '✓ Правильно! (' + s + '/' + STREAK_NEEDED + ')';
    fb.className = 'quiz-feedback ok';
    inp.className = 'quiz-input ok'; inp.disabled = true;
    dotsEl.innerHTML = renderDots(Math.min(s, STREAK_NEEDED), false);
    saveStats();
    phase = 'next';
    setControlsState('next');
    setTimeout(() => animateNext(), 1300);
  } else {
    const oldStreak = stats[current.en].streak;
    stats[current.en].streak = 0;
    saveStats();
    inp.className = 'quiz-input err'; inp.disabled = true;
    fb.textContent = '✗ Правильный ответ: ' + answer + (oldStreak > 0 ? ' — прогресс сброшен' : '');
    fb.className = 'quiz-feedback err';
    dotsEl.innerHTML = renderDots(0, oldStreak > 0);
    if (oldStreak > 0) setTimeout(() => { dotsEl.innerHTML = renderDots(0, false); }, 700);
    phase = 'next';
    setControlsState('next');
    setTimeout(() => animateNext(), 2200);
  }
}

function dontKnow() {
  if (phase !== 'input') return;
  const answer = mode === 'ru-en' ? current.en : current.ru;
  const oldStreak = stats[current.en].streak;
  stats[current.en].streak = 0;
  saveStats();

  const inp = document.getElementById('quiz-input');
  inp.disabled = true; inp.className = 'quiz-input err';

  const fb = document.getElementById('quiz-feedback');
  fb.textContent = 'Ответ: ' + answer + (oldStreak > 0 ? ' — прогресс сброшен' : '');
  fb.className = 'quiz-feedback err';

  const dotsEl = document.getElementById('quiz-dots');
  dotsEl.innerHTML = renderDots(0, oldStreak > 0);
  if (oldStreak > 0) setTimeout(() => { dotsEl.innerHTML = renderDots(0, false); }, 700);

  phase = 'next';
  setControlsState('next');
  setTimeout(() => animateNext(), 2200);
}

function skipWord() {
  if (phase !== 'input') return;
  animateNext();
}

function animateNext() {
  const card = document.getElementById('quiz-card');
  card.style.opacity = '0'; card.style.transform = 'translateY(-6px)'; card.style.transition = 'opacity 0.2s, transform 0.2s';
  setTimeout(() => { card.style.opacity = ''; card.style.transform = ''; card.style.transition = ''; nextCard(); }, 220);
}

function goHome() { renderHome(); }

function showDone() {
  const tags = words.filter(w => stats[w.en]?.learned).map(w => '<div class="done-tag">' + w.ru + ' — ' + w.en + '</div>').join('');
  document.getElementById('done-tags').innerHTML = tags || '<p style="color:var(--ink3)">Пока ничего</p>';
  show('screen-done');
}

function resetProgress() {
  words.forEach(w => { stats[w.en] = { streak: 0, learned: false }; });
  saveStats(); renderHome();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.querySelector('#screen-quiz.active')) {
    if (phase === 'input') handleBtn();
    else animateNext();
  }
});

init();
</script>
</body>
</html>
